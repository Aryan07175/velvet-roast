<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Roast | Dashboard</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-main {
            padding-top: 120px;
            padding-bottom: 80px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .welcome-text {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--color-primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 991px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .order-panel,
        .history-panel {
            background: var(--color-bg-light);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
        }

        .panel-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--color-text-main);
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s;
        }

        .menu-item-row:hover {
            border-color: var(--color-primary);
        }

        .item-details h4 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .item-details span {
            color: var(--color-primary);
            font-weight: 600;
        }

        .cart-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .qty-btn:hover {
            background: var(--color-primary);
            color: var(--color-bg-dark);
        }

        .qty-display {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        .cart-summary {
            margin-top: 30px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .order-history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-card {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border-left: 3px solid var(--color-primary);
        }

        .history-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .history-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(212, 175, 55, 0.2);
            color: var(--color-primary);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <header class="header sticky" id="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-mug-hot"></i> Velvet Roast
            </a>
            <div class="nav-actions">
                <button class="btn btn-outline" id="btn-logout">Logout</button>
            </div>
        </nav>
    </header>

    <main class="dashboard-main container fade-up visible">
        <div class="dashboard-header">
            <h1 class="welcome-text">Hello, <span id="user-name">Guest</span></h1>
        </div>

        <div class="dashboard-grid">
            <!-- Order Menu -->
            <div class="order-panel">
                <h2 class="panel-title">Place an Order</h2>
                <div class="menu-list" id="menu-items-container">
                    <!-- Items rendered via JS -->
                </div>

                <div class="cart-summary">
                    <div class="cart-total-row">
                        <span>Total:</span>
                        <span id="cart-total">$0.00</span>
                    </div>
                    <button class="btn btn-primary w-100" id="btn-place-order" disabled>Submit Order</button>
                </div>
            </div>

            <!-- Order History -->
            <div class="history-panel">
                <h2 class="panel-title">Recent Orders</h2>
                <div class="order-history-list" id="order-history-container">
                    <p class="text-muted">Loading orders...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
</body>

</html>
